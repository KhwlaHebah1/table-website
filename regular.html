<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Package</title>

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial;
        }

        .back-btn {
            padding: 20px;
        }

        .back-btn a {
            color: gold;
            text-decoration: none;
            font-weight: bold;
        }

        h1 {
            text-align: center;
            color: gold;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            padding: 30px;
        }

        .gallery img {
            width: 250px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* LIGHTBOX */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 12px;
            cursor: grab;
            transition: transform 0.2s;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            cursor: pointer;
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 50px;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            padding: 10px;
        }

        .arrow:hover {
            color: white;
        }

        .arrow.left {
            left: 30px;
        }

        .arrow.right {
            right: 30px;
        }

        .arrow.disabled {
            opacity: 0.2;
            pointer-events: none;
        }

        .counter {
            position: absolute;
            top: 20px;
            left: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

    <div class="back-btn">
        <a href="index.html">← الرجوع</a>
    </div>

    <h1>VIP Package</h1>

    <div class="gallery">
        <img src="gallery/regular-package/1.webp">
        <img src="gallery/regular-package/2.webp">
        <img src="gallery/regular-package/3.webp">
        <img src="gallery/regular-package/4.webp">
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close" id="closeBtn">&times;</span>
        <div class="counter" id="counter"></div>

        <span class="arrow left" id="prevBtn">&#10094;</span>
        <img id="lightboxImg">
        <span class="arrow right" id="nextBtn">&#10095;</span>
    </div>

    <script>
        const images = document.querySelectorAll(".gallery img");
        const lightbox = document.getElementById("lightbox");
        const img = document.getElementById("lightboxImg");
        const nextBtn = document.getElementById("nextBtn");
        const prevBtn = document.getElementById("prevBtn");
        const closeBtn = document.getElementById("closeBtn");
        const counter = document.getElementById("counter");

        let current = 0;
        let scale = 1;
        let posX = 0;
        let posY = 0;

        function update() {
            img.src = images[current].src;
            counter.textContent = `${current + 1} / ${images.length}`;

            prevBtn.classList.toggle("disabled", current === 0);
            nextBtn.classList.toggle("disabled", current === images.length - 1);

            scale = 1;
            posX = 0;
            posY = 0;
            applyTransform();
        }

        function applyTransform() {
            img.style.transform = `scale(${scale}) translate(${posX}px, ${posY}px)`;
        }

        function openBox(i) {
            current = i;
            lightbox.classList.add("open");
            update();
        }

        function closeBox() {
            lightbox.classList.remove("open");
        }

        images.forEach((el, i) => {
            el.onclick = () => openBox(i);
        });

        closeBtn.onclick = closeBox;

        nextBtn.onclick = (e) => {
            e.stopPropagation();
            if (current < images.length - 1) { current++; update(); }
        };

        prevBtn.onclick = (e) => {
            e.stopPropagation();
            if (current > 0) { current--; update(); }
        };

        lightbox.onclick = (e) => {
            if (e.target === lightbox) closeBox();
        };

        /* KEYBOARD */
        document.addEventListener("keydown", (e) => {
            if (!lightbox.classList.contains("open")) return;

            if (e.key === "Escape") closeBox();
            if (e.key === "ArrowRight" && current < images.length - 1) { current++; update(); }
            if (e.key === "ArrowLeft" && current > 0) { current--; update(); }
        });

        /* SWIPE */
        let startX = 0;

        lightbox.addEventListener("touchstart", e => {
            startX = e.touches[0].clientX;
        });

        lightbox.addEventListener("touchend", e => {
            let endX = e.changedTouches[0].clientX;
            let diff = endX - startX;

            if (Math.abs(diff) > 50) {
                if (diff < 0 && current < images.length - 1) current++;
                if (diff > 0 && current > 0) current--;
                update();
            }
        });

        /* ZOOM (mouse wheel) */
        img.addEventListener("wheel", (e) => {
            e.preventDefault();
            scale += e.deltaY * -0.001;
            scale = Math.min(Math.max(1, scale), 3);
            applyTransform();
        });

        /* DRAG */
        let isDragging = false;

        img.addEventListener("mousedown", () => {
            isDragging = true;
            img.style.cursor = "grabbing";
        });

        document.addEventListener("mouseup", () => {
            isDragging = false;
            img.style.cursor = "grab";
        });

        document.addEventListener("mousemove", (e) => {
            if (!isDragging) return;
            posX += e.movementX;
            posY += e.movementY;
            applyTransform();
        });

        /* DOUBLE CLICK ZOOM */
        img.addEventListener("dblclick", () => {
            scale = scale === 1 ? 2 : 1;
            applyTransform();
        });
    </script>

</body>

</html>
